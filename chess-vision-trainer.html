function modeStepTracer(){
  setInfo(`<strong>Step Tracer</strong><br><br>
    A piece makes several moves described one at a time.<br>
    After each description, type the square the piece lands on.<br><br>
    Rook: <em>"3 up"</em>, <em>"4 right"</em>, <em>"2 down"</em>…<br>
    Bishop: <em>"2 up-right"</em>, <em>"3 down-left"</em>…<br><br>
    No board. No starting position shown between steps. Pure calculation.`);
  nextStepTracer();
}

function nextStepTracer(){
  const numMoves=Math.min(2+Math.floor(score.streak/3),7);
  const types=['bishop','rook'];
  const type=types[Math.floor(Math.random()*2)];
  let sq, path, tries=0;
  do{ sq=randSq(); path=generateSequence(type,sq.f,sq.r,numMoves); tries++; }
  while(path.length<3&&tries<20);
  if(path.length<3){ nextStepTracer(); return; }

  quiz={type,path,step:0,answered:false};

  clearBoard(); showBlind();
  const start=sqName(path[0].f,path[0].r).toUpperCase();
  const desc=describeMoveStep(type,path[0],path[1]);
  setEx('Step Tracer',
    `${PIECE_SYMBOLS[type]} <strong>${PIECE_NAMES[type]}</strong> starts on <strong>${start}</strong><br>Move 1 of ${numMoves}: ${desc}`,
    'Where does it land?'
  );
  showTextInput(); focusInput();
  setAns([{label:'Give up',cls:'neutral',cb:revealStepTracer}]);
}

function submitStepTracer(input){
  if(quiz.answered) return;
  const ans=normSq(input);
  if(!isValidSqName(ans)){ shakeInput(); return; }
  clearInput();

  const step=quiz.step;
  const expected=sqName(quiz.path[step+1].f,quiz.path[step+1].r);
  if(ans!==expected){
    quiz.answered=true; recordAnswer(false);
    revealStepTracer(`✗ Expected ${expected.toUpperCase()}, got ${ans.toUpperCase()}`);
    return;
  }

  quiz.step++;
  const numMoves=quiz.path.length-1;
  if(quiz.step>=numMoves){
    quiz.answered=true; recordAnswer(true);
    hideBlind();
    quiz.path.forEach((s,i)=>{ highlights[sqName(s.f,s.r)]=i===0?'sel':i===quiz.path.length-1?'ok':'path'; });
    pieces[sqName(quiz.path[0].f,quiz.path[0].r)]=PIECE_SYMBOLS[quiz.type];
    applyHighlights();
    showFeedback(true,`✓ Perfect — all ${numMoves} steps correct!`);
    hideTextInput();
    autoNext(nextStepTracer);
  } else {
    const desc=describeMoveStep(quiz.type,quiz.path[quiz.step],quiz.path[quiz.step+1]);
    setEx('Step Tracer',
      `✓ ${expected.toUpperCase()} — Move ${quiz.step+1} of ${numMoves}: ${desc}`,
      'Where does it land?'
    );
    focusInput();
  }
}

function revealStepTracer(msg){
  quiz.answered=true; lastRight=false; hideBlind();
  quiz.path.forEach((s,i)=>{
    highlights[sqName(s.f,s.r)]=i===0?'sel':i<=quiz.step?'ok':'dest';
  });
  pieces[sqName(quiz.path[0].f,quiz.path[0].r)]=PIECE_SYMBOLS[quiz.type];
  applyHighlights(); hideTextInput();
  if(msg) showFeedback(false,msg);
  autoNext(nextStepTracer);
}

// ════════════════════════════════════════════════════
//  BATCH ENTRY HELPERS
// ════════════════════════════════════════════════════
// parse "c3 e3, d2 -> f2" → ['c3','e3','d2','f2'] (order kept, no dedupe)
function parseSquares(str){
  return (str||'').toLowerCase().split(/[\s,;>→-]+/).filter(isValidSqName);
}
// parse "e4d f5l" → [{sq,color},...]
function parseSqColorTokens(str){
  const out=[];
  (str||'').toLowerCase().split(/[\s,;]+/).forEach(t=>{
    if(t.length===3&&isValidSqName(t.slice(0,2))&&(t[2]==='d'||t[2]==='l')){
      out.push({sq:t.slice(0,2), color:t[2]==='d'?'dark':'light'});
    }
  });
  return out;
}
function batchTags(hit,miss,extra){
  let h='';
  if(miss.length)  h+=`<div>MISSED ${miss.map(s=>`<span class="tg tg-miss">${s.toUpperCase()}</span>`).join('')}</div>`;
  if(extra.length) h+=`<div>EXTRA ${extra.map(s=>`<span class="tg tg-extra">${s.toUpperCase()}</span>`).join('')}</div>`;
  if(hit.length)   h+=`<div>GOT ${hit.map(s=>`<span class="tg tg-hit">${s.toUpperCase()}</span>`).join('')}</div>`;
  return h;
}

// ════════════════════════════════════════════════════
//  GENERIC PIECE MOVES + BFS (any piece)
// ════════════════════════════════════════════════════
function genericMoves(type,f,r){
  if(type==='knight') return knightMoves(f,r);
  if(type==='bishop') return bishopSquares(f,r);
  if(type==='rook')   return rookSquares(f,r);
  if(type==='queen')  return [...bishopSquares(f,r),...rookSquares(f,r)];
  if(type==='king')   return kingNeighbors(f,r);
  return [];
}
function genericBFS(type,sf,sr,ef,er){
  if(sf===ef&&sr===er) return [{f:sf,r:sr}];
  const prev={}; const q=[{f:sf,r:sr}];
  prev[sqName(sf,sr)]=null;
  while(q.length){
    const cur=q.shift();
    for(const nx of genericMoves(type,cur.f,cur.r)){
      const k=sqName(nx.f,nx.r);
      if(k in prev) continue;
      prev[k]=cur;
      if(nx.f===ef&&nx.r===er){
        const path=[{f:nx.f,r:nx.r}]; let n=cur;
        while(n){path.unshift({f:n.f,r:n.r});n=prev[sqName(n.f,n.r)];}
        return path;
      }
      q.push({f:nx.f,r:nx.r});
    }
  }
  return null;
}

// ════════════════════════════════════════════════════
//  MODE: SHORTEST PATH  (any piece, BFS-validated)
// ════════════════════════════════════════════════════
function modeShortestPath(){
  setInfo(`<strong>Shortest Path</strong><br><br>
    A piece must travel from A to B in the minimum number of moves.<br><br>
    <strong>One at a time:</strong> type each square the piece lands on, hop by hop.<br>
    <strong>All at once</strong> (⚙ setting): type the whole route including start and end, e.g. <kbd>a1 c2 e3</kbd>.<br><br>
    Any legal route of optimal length counts — there is often more than one.<br>
    Pieces: Knight, King, Queen, Rook, Bishop. Knight and King give the longest routes.`);
  nextShortestPath();
}

function nextShortestPath(){
  const types=['knight','knight','king','queen','rook','bishop']; // knight weighted ×2 — the key training piece
  const type=types[Math.floor(Math.random()*types.length)];
  let sf,sr,ef,er,path,tries=0;
  do{
    ({f:sf,r:sr}=randSq());
    let t;
    do{ t=randSq(); }
    while((t.f===sf&&t.r===sr)||(type==='bishop'&&sqColor(t.f,t.r)!==sqColor(sf,sr)));
    ef=t.f; er=t.r;
    path=genericBFS(type,sf,sr,ef,er);
    tries++;
  }while((!path||path.length<3)&&tries<200);
  if(!path||path.length<3){ nextShortestPath(); return; }

  quiz={type,sf,sr,ef,er,path,userPath:[{f:sf,r:sr}],answered:false};

  clearBoard(); showBlind();
  highlights[sqName(sf,sr)]='sel';
  highlights[sqName(ef,er)]='dest';
  pieces[sqName(sf,sr)]=PIECE_SYMBOLS[type];
  applyHighlights();

  const opt=path.length-1;
  const batch=settings.entry==='batch';
  setEx('Shortest Path',
    `${PIECE_SYMBOLS[type]} <strong>${PIECE_NAMES[type]}</strong>: ${sqName(sf,sr).toUpperCase()} → ${sqName(ef,er).toUpperCase()}<br>Minimum: <strong>${opt} move${opt>1?'s':''}</strong>`,
    batch?`Type the whole route: <kbd>${sqName(sf,sr)} … ${sqName(ef,er)}</kbd>`:'Type each landing square, hop by hop'
  );
  showTextInput(batch?{batch:true,placeholder:`${sqName(sf,sr)} … ${sqName(ef,er)}`}:{});
  focusInput();
  setAns([{label:'Give up',cls:'neutral',cb:revealShortestPath}]);
}

function submitShortestPath(input){
  if(quiz.answered) return;
  if(settings.entry==='batch'){ submitShortestPathBatch(input); return; }
  const ans=normSq(input);
  if(!isValidSqName(ans)){ shakeInput(); return; }
  const cur=quiz.userPath[quiz.userPath.length-1];
  const legal=genericMoves(quiz.type,cur.f,cur.r).some(s=>sqName(s.f,s.r)===ans);
  if(!legal){
    showFeedback(false,`✗ ${ans.toUpperCase()} is not a legal ${quiz.type} move from ${sqName(cur.f,cur.r).toUpperCase()}`);
    setTimeout(hideFeedback,900); return;
  }
  clearInput();
  const {f,r}=parseSq(ans);
  quiz.userPath.push({f,r});
  if(!highlights[ans]) highlights[ans]='path';
  applyHighlights();
  hideFeedback();
  if(f===quiz.ef&&r===quiz.er){
    quiz.answered=true;
    const moves=quiz.userPath.length-1, opt=quiz.path.length-1;
    const right=moves===opt;
    recordAnswer(right);
    hideBlind();
    showFeedback(right,
      right?`✓ ${moves} moves — optimal!`
           :`Valid but not optimal: ${moves} vs ${opt}. Optimal e.g.: ${quiz.path.map(s=>sqName(s.f,s.r).toUpperCase()).join(' → ')}`
    );
    hideTextInput();
    autoNext(nextShortestPath);
  }
}

function submitShortestPathBatch(input){
  const tokens=parseSquares(input);
  if(tokens.length<2){ shakeInput(); return; }
  quiz.answered=true;
  const startN=sqName(quiz.sf,quiz.sr), endN=sqName(quiz.ef,quiz.er);
  let err=null;
  if(tokens[0]!==startN)                      err=`must start at ${startN.toUpperCase()}`;
  else if(tokens[tokens.length-1]!==endN)     err=`must end at ${endN.toUpperCase()}`;
  else{
    for(let i=0;i<tokens.length-1;i++){
      const a=parseSq(tokens[i]);
      if(!genericMoves(quiz.type,a.f,a.r).some(s=>sqName(s.f,s.r)===tokens[i+1])){
        err=`${quiz.type} can't go ${tokens[i].toUpperCase()} → ${tokens[i+1].toUpperCase()}`; break;
      }
    }
  }
  const right=!err&&tokens.length===quiz.path.length;
  recordAnswer(right);
  hideBlind();
  tokens.forEach((sq,i)=>{ if(!highlights[sq]) highlights[sq]=i===0?'sel':'path'; });
  quiz.path.forEach(s=>{ const k=sqName(s.f,s.r); if(!highlights[k]) highlights[k]='ghost'; });
  highlights[endN]=right?'ok':'dest';
  pieces[startN]=PIECE_SYMBOLS[quiz.type];
  applyHighlights();
  const optStr=quiz.path.map(s=>sqName(s.f,s.r).toUpperCase()).join(' → ');
  showFeedback(right,
    right?`✓ ${tokens.length-1} moves — optimal!`
         :err?`✗ ${err}. Optimal: ${optStr}`
             :`Valid but ${tokens.length-1} moves vs optimal ${quiz.path.length-1}: ${optStr}`
  );
  hideTextInput();
  autoNext(nextShortestPath);
}

function revealShortestPath(){
  quiz.answered=true; lastRight=false; hideBlind();
  quiz.path.forEach((s,i)=>{
    const k=sqName(s.f,s.r);
    highlights[k]=i===0?'sel':i===quiz.path.length-1?'ok':'path';
  });
  pieces[sqName(quiz.sf,quiz.sr)]=PIECE_SYMBOLS[quiz.type];
  applyHighlights(); hideTextInput();
  showFeedback(false,`Optimal: ${quiz.path.map(s=>sqName(s.f,s.r).toUpperCase()).join(' → ')}`);
  autoNext(nextShortestPath);
}

let hfCfg={sub:'color',think:8,rest:3,rate:0.9};
let hf={sid:0,timer:null,count:0};

function sqTTS(s){ return s[0].toUpperCase()+' '+s[1]; }

function modeHandsFree(){
  document.getElementById('blind-cover').classList.remove('off');
  setEx('🎧 Hands-Free',
    'Audio-only training: the question is spoken aloud, you answer in your head, then the answer is spoken.',
    'Headphones on · eyes closed or screen away');
  setInfo(`<strong>Hands-Free</strong><br><br>
    Pure audio loop — no typing, no looking. Self-scored: count your own hits.<br><br>
    <strong>🎨 Color</strong>: square → light or dark?<br>
    <strong>📡 Destinations</strong>: knight/king on a square → say every reachable square.<br>
    <strong>🧭 Path</strong>: knight/king A→B → say the shortest route.<br>
    <strong>🔀 Mixed</strong>: all three shuffled.<br><br>
    This is the final stage of visualization training — everything happens in your head. Use it lying down, walking, or with eyes closed.`);
  renderHFSettings();
}

function renderHFSettings(){
  const a=document.getElementById('ans-area');
  const sub=(id,l)=>`<button class="sbtn${hfCfg.sub===id?' on':''}" data-hf="${id}">${l}</button>`;
  a.innerHTML=`
    <div style="width:100%">
      <div class="set-row" style="margin-top:0"><span class="set-lbl">Question type</span>
        ${sub('color','🎨 Color')}${sub('dest','📡 Destinations')}${sub('path','🧭 Path')}${sub('mixed','🔀 Mixed')}
      </div>
      <div class="hf-row"><label>Think time <span class="hf-val" id="hf-think-v">${hfCfg.think}s</span></label>
        <input type="range" id="hf-think" min="3" max="45" value="${hfCfg.think}"></div>
      <div class="hf-row"><label>Pause after answer <span class="hf-val" id="hf-rest-v">${hfCfg.rest}s</span></label>
        <input type="range" id="hf-rest" min="1" max="12" value="${hfCfg.rest}"></div>
      <div class="hf-row"><label>Speech rate <span class="hf-val" id="hf-rate-v">${hfCfg.rate.toFixed(2)}×</span></label>
        <input type="range" id="hf-rate" min="0.5" max="1.5" step="0.05" value="${hfCfg.rate}"></div>
      <div style="margin-top:12px"><button class="abtn accent" id="hf-start">▶ Start audio session</button></div>
    </div>`;
  a.querySelectorAll('[data-hf]').forEach(b=>b.addEventListener('click',()=>{hfCfg.sub=b.dataset.hf;renderHFSettings();}));
  a.querySelector('#hf-think').addEventListener('input',e=>{hfCfg.think=+e.target.value;a.querySelector('#hf-think-v').textContent=hfCfg.think+'s';});
  a.querySelector('#hf-rest').addEventListener('input',e=>{hfCfg.rest=+e.target.value;a.querySelector('#hf-rest-v').textContent=hfCfg.rest+'s';});
  a.querySelector('#hf-rate').addEventListener('input',e=>{hfCfg.rate=+e.target.value;a.querySelector('#hf-rate-v').textContent=hfCfg.rate.toFixed(2)+'×';});
  a.querySelector('#hf-start').addEventListener('click',hfStart);
}

function hfGen(){
  const pick=hfCfg.sub==='mixed'?['color','dest','path'][Math.floor(Math.random()*3)]:hfCfg.sub;
  if(pick==='color'){
    const {f,r}=randSq(); const n=sqName(f,r);
    return {text:sqTTS(n)+'. Light or dark?', show:n.toUpperCase(),
            ansText:`${sqTTS(n)} is ${sqColor(f,r)}.`, ansShow:`${n.toUpperCase()} — ${sqColor(f,r)}`};
  }
  if(pick==='dest'){
    const type=['knight','king'][Math.floor(Math.random()*2)];
    const {f,r}=randSq(); const n=sqName(f,r);
    const targets=genericMoves(type,f,r).map(s=>sqName(s.f,s.r)).sort();
    return {text:`${PIECE_NAMES[type]} on ${sqTTS(n)}. Name every square it can reach.`,
            show:`${PIECE_SYMBOLS[type]} ${PIECE_NAMES[type]} on ${n.toUpperCase()} → all destinations?`,
            ansText:`${targets.length} squares: ${targets.map(sqTTS).join(', ')}.`,
            ansShow:`${targets.length}: ${targets.map(s=>s.toUpperCase()).join(' ')}`};
  }
  // path
  const type=['knight','king'][Math.floor(Math.random()*2)];
  let sf,sr,ef,er,path;
  do{ ({f:sf,r:sr}=randSq()); ({f:ef,r:er}=randSq()); path=genericBFS(type,sf,sr,ef,er); }
  while(!path||path.length<3||path.length>5);
  const names=path.map(s=>sqName(s.f,s.r));
  return {text:`${PIECE_NAMES[type]}. From ${sqTTS(names[0])} to ${sqTTS(names[names.length-1])}. Shortest path.`,
          show:`${PIECE_SYMBOLS[type]} ${names[0].toUpperCase()} → ${names[names.length-1].toUpperCase()} — shortest route?`,
          ansText:`${names.length-1} moves: ${names.map(sqTTS).join(', ')}.`,
          ansShow:names.map(s=>s.toUpperCase()).join(' → ')};
}

function hfSpeak(text,mySid){
  return new Promise(res=>{
    if(hf.sid!==mySid||!('speechSynthesis' in window)){ res(); return; }
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=hfCfg.rate; u.lang='en-US';
    u.onend=()=>res(); u.onerror=()=>res();
    speechSynthesis.speak(u);
  });
}

function hfCountdown(secs,mySid,label){
  return new Promise(res=>{
    if(hf.sid!==mySid){ res(); return; }
    let rem=secs;
    const hint=document.getElementById('ex-hint');
    hint.textContent=`${label} — ${rem}s`;
    hf.timer=setInterval(()=>{
      if(hf.sid!==mySid){ clearInterval(hf.timer); hf.timer=null; res(); return; }
      rem--;
      if(rem<=0){ clearInterval(hf.timer); hf.timer=null; res(); return; }
      hint.textContent=`${label} — ${rem}s`;
    },1000);
  });
}

async function hfLoop(mySid){
  while(hf.sid===mySid){
    const q=hfGen(); hf.count++;
    hideFeedback();
    setEx('🎧 Hands-Free',
      `<span style="font-size:1.4rem;font-weight:800;letter-spacing:1px">${q.show}</span>`,
      `Question #${hf.count} · 🔊 speaking…`);
    await hfSpeak(q.text,mySid);          if(hf.sid!==mySid) return;
    await hfCountdown(hfCfg.think,mySid,'💭 Think'); if(hf.sid!==mySid) return;
    showFeedback(true,q.ansShow);
    document.getElementById('ex-hint').textContent='💬 Answer…';
    await hfSpeak(q.ansText,mySid);       if(hf.sid!==mySid) return;
    await hfCountdown(hfCfg.rest,mySid,'⏭ Next in'); if(hf.sid!==mySid) return;
  }
}

function hfStart(){
  if(!('speechSynthesis' in window)){ showFeedback(false,'This browser has no speech synthesis (TTS).'); return; }
  hf.sid=Date.now(); hf.count=0;
  document.getElementById('blind-cover').classList.remove('off');
  const a=document.getElementById('ans-area');
  a.innerHTML='<button class="abtn neutral" id="hf-stop">■ Stop session</button>';
  a.querySelector('#hf-stop').addEventListener('click',hfStop);
  hfLoop(hf.sid);
}

function hfStop(){
  if(hf.sid===0) return;
  hf.sid=0;
  if(hf.timer){ clearInterval(hf.timer); hf.timer=null; }
  if('speechSynthesis' in window) speechSynthesis.cancel();
  if(mode==='hands-free'){ hideFeedback(); modeHandsFree(); }
}

// ════════════════════════════════════════════════════
//  PGN/SAN CHESS ENGINE  (full legality: castling, ep,
//  promotion, disambiguation — tested in .dev/engine-test.js)
// ════════════════════════════════════════════════════
const START_FEN='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
const SLIDE_R=[[1,0],[-1,0],[0,1],[0,-1]], SLIDE_B=[[1,1],[1,-1],[-1,1],[-1,-1]];
const KN_D=[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];

function fenToPos(fen){
  const parts=fen.trim().split(/\s+/);
  const rows=parts[0].split('/');
  const board={};
  for(let ri=0;ri<8;ri++){
    const rank=8-ri; let file=0;
    for(const ch of rows[ri]){
      if(/\d/.test(ch)){ file+=+ch; continue; }
      board[FILES[file]+rank]={t:ch.toLowerCase(), c:ch===ch.toUpperCase()?'w':'b'};
      file++;
    }
  }
  return { board, turn:parts[1]||'w',
           castle:(parts[2]&&parts[2]!=='-')?parts[2]:'',
           ep:(parts[3]&&parts[3]!=='-')?parts[3]:null };
}
function clonePos(p){ return {board:Object.assign({},p.board),turn:p.turn,castle:p.castle,ep:p.ep}; }
function sqFR(sq){ return [FILES.indexOf(sq[0]), +sq[1]-1]; }
function frSq(f,r){ return FILES[f]+(r+1); }
function onB(f,r){ return f>=0&&f<8&&r>=0&&r<8; }

function attacked(pos,sq,by){
  const fr=sqFR(sq), f=fr[0], r=fr[1];
  for(const d of KN_D){
    if(!onB(f+d[0],r+d[1])) continue;
    const p=pos.board[frSq(f+d[0],r+d[1])];
    if(p&&p.c===by&&p.t==='n') return true;
  }
  for(let df=-1;df<=1;df++)for(let dr=-1;dr<=1;dr++){
    if(!df&&!dr) continue;
    if(!onB(f+df,r+dr)) continue;
    const p=pos.board[frSq(f+df,r+dr)];
    if(p&&p.c===by&&p.t==='k') return true;
  }
  const pd=by==='w'?1:-1;
  for(const df of [-1,1]){
    if(!onB(f+df,r-pd)) continue;
    const p=pos.board[frSq(f+df,r-pd)];
    if(p&&p.c===by&&p.t==='p') return true;
  }
  for(const grp of [[SLIDE_R,'rq'],[SLIDE_B,'bq']]){
    for(const d of grp[0]){
      let nf=f+d[0],nr=r+d[1];
      while(onB(nf,nr)){
        const p=pos.board[frSq(nf,nr)];
        if(p){ if(p.c===by&&grp[1].includes(p.t)) return true; break; }
        nf+=d[0]; nr+=d[1];
      }
    }
  }
  return false;
}
function kingSqOf(pos,c){ for(const sq in pos.board){ const p=pos.board[sq]; if(p.t==='k'&&p.c===c) return sq; } return null; }

function pieceDests(pos,from){
  const p=pos.board[from]; if(!p) return [];
  const fr=sqFR(from), f=fr[0], r=fr[1]; const out=[];
  const tryAdd=(nf,nr)=>{ if(!onB(nf,nr)) return false;
    const q=pos.board[frSq(nf,nr)];
    if(!q){ out.push(frSq(nf,nr)); return true; }
    if(q.c!==p.c) out.push(frSq(nf,nr));
    return false; };
  if(p.t==='n'){ for(const d of KN_D) tryAdd(f+d[0],r+d[1]); }
  else if(p.t==='k'){ for(let df=-1;df<=1;df++)for(let dr=-1;dr<=1;dr++){ if(df||dr) tryAdd(f+df,r+dr); } }
  else if(p.t==='p'){
    const d=p.c==='w'?1:-1, startR=p.c==='w'?1:6;
    if(onB(f,r+d)&&!pos.board[frSq(f,r+d)]){
      out.push(frSq(f,r+d));
      if(r===startR&&!pos.board[frSq(f,r+2*d)]) out.push(frSq(f,r+2*d));
    }
    for(const df of [-1,1]){
      if(!onB(f+df,r+d)) continue;
      const t=frSq(f+df,r+d), q=pos.board[t];
      if((q&&q.c!==p.c)||t===pos.ep) out.push(t);
    }
  }
  else {
    const dirs=p.t==='r'?SLIDE_R:p.t==='b'?SLIDE_B:SLIDE_R.concat(SLIDE_B);
    for(const d of dirs){
      let nf=f+d[0],nr=r+d[1];
      while(tryAdd(nf,nr)){ nf+=d[0]; nr+=d[1]; }
    }
  }
  return out;
}

function makeMove(pos,from,to,promo){
  const np=clonePos(pos); const p=np.board[from];
  delete np.board[from];
  if(p.t==='p'&&to===pos.ep&&!pos.board[to]){
    const tfr=sqFR(to);
    delete np.board[frSq(tfr[0], p.c==='w'?tfr[1]-1:tfr[1]+1)];
  }
  np.board[to]=promo?{t:promo,c:p.c}:p;
  if(p.t==='k'){
    const ff=sqFR(from)[0], tf=sqFR(to)[0];
    if(Math.abs(tf-ff)===2){
      const rank=from[1];
      if(tf>ff){ np.board['f'+rank]=np.board['h'+rank]; delete np.board['h'+rank]; }
      else     { np.board['d'+rank]=np.board['a'+rank]; delete np.board['a'+rank]; }
    }
    np.castle=np.castle.replace(p.c==='w'?/[KQ]/g:/[kq]/g,'');
  }
  for(const pair of [['a1','Q'],['h1','K'],['a8','q'],['h8','k']]){
    if(from===pair[0]||to===pair[0]) np.castle=np.castle.replace(pair[1],'');
  }
  np.ep=null;
  if(p.t==='p'){
    const ffr=sqFR(from), tfr=sqFR(to);
    if(Math.abs(tfr[1]-ffr[1])===2) np.ep=frSq(ffr[0],(ffr[1]+tfr[1])/2);
  }
  np.turn=pos.turn==='w'?'b':'w';
  return np;
}
function legalAfter(pos,from,to,promo){
  const np=makeMove(pos,from,to,promo);
  const k=kingSqOf(np,pos.turn);
  return !!k&&!attacked(np,k,np.turn);
}

function parseSAN(pos,sanRaw){
  let san=sanRaw.replace(/[+#!?]+$/,'');
  if(/^(O-O-O|0-0-0)$/.test(san)||/^(O-O|0-0)$/.test(san)){
    const long=/^(O-O-O|0-0-0)$/.test(san);
    const rank=pos.turn==='w'?'1':'8';
    const from='e'+rank, to=(long?'c':'g')+rank;
    const p=pos.board[from];
    if(!p||p.t!=='k'||p.c!==pos.turn) throw new Error('castle: no king on '+from);
    const need=pos.turn==='w'?(long?'Q':'K'):(long?'q':'k');
    if(!pos.castle.includes(need)) throw new Error('castle: no rights');
    const between=long?['d'+rank,'c'+rank,'b'+rank]:['f'+rank,'g'+rank];
    for(const s of between) if(pos.board[s]) throw new Error('castle: blocked');
    const opp=pos.turn==='w'?'b':'w';
    const walk=long?['e'+rank,'d'+rank,'c'+rank]:['e'+rank,'f'+rank,'g'+rank];
    for(const s of walk) if(attacked(pos,s,opp)) throw new Error('castle: through check');
    return {from,to,promo:null};
  }
  let promo=null;
  const pm=san.match(/=([QRBN])$/i);
  if(pm){ promo=pm[1].toLowerCase(); san=san.slice(0,pm.index); }
  const m=san.match(/^([KQRBN]?)([a-h]?)([1-8]?)x?([a-h][1-8])$/);
  if(!m) throw new Error('unreadable move: '+sanRaw);
  const pt=m[1]?m[1].toLowerCase():'p', df=m[2], dr=m[3], to=m[4];
  const cands=[];
  for(const sq in pos.board){
    const p=pos.board[sq];
    if(p.c!==pos.turn||p.t!==pt) continue;
    if(df&&sq[0]!==df) continue;
    if(dr&&sq[1]!==dr) continue;
    if(pieceDests(pos,sq).indexOf(to)===-1) continue;
    if(!legalAfter(pos,sq,to,promo)) continue;
    cands.push(sq);
  }
  if(cands.length===0) throw new Error('illegal move: '+sanRaw);
  if(cands.length>1)  throw new Error('ambiguous move: '+sanRaw);
  return {from:cands[0],to,promo};
}

function pgnToSANs(text){
  let fen=null;
  const fm=text.match(/\[FEN\s+"([^"]+)"/);
  if(fm) fen=fm[1];
  const noHdr=text.replace(/\[[^\]]*\]/g,' ').replace(/\{[^}]*\}/g,' ');
  let depth=0,out='';
  for(const ch of noHdr){
    if(ch==='(') depth++;
    else if(ch===')') depth=Math.max(0,depth-1);
    else if(depth===0) out+=ch;
  }
  const sans=out.replace(/\$\d+/g,' ')
    .replace(/\d+\.{1,3}/g,' ')
    .split(/\s+/)
    .filter(s=>s&&!/^(1-0|0-1|1\/2-1\/2|\*)$/.test(s));
  return {fen,sans};
}

// returns {startFen, steps[], positions[] (position AFTER each ply), finalPos}
function parseGame(text){
  const parsed=pgnToSANs(text);
  let pos=fenToPos(parsed.fen||START_FEN);
  const steps=[], positions=[];
  for(const san of parsed.sans){
    const mv=parseSAN(pos,san);
    steps.push({san,from:mv.from,to:mv.to,promo:mv.promo,
                piece:pos.board[mv.from].t,color:pos.turn});
    pos=makeMove(pos,mv.from,mv.to,mv.promo);
    positions.push(pos);
  }
  return {startFen:parsed.fen||START_FEN,steps,positions,finalPos:pos};
}

function splitPGNGames(text){
  const games=[];
  let cur='';
  for(const line of text.split(/\r?\n/)){
    if(/^\[Event\b/i.test(line)&&cur.trim()&&/[a-h1-8]/.test(cur.replace(/\[[^\]]*\]/g,''))){
      games.push(cur.trim()); cur=line;
    } else cur+='\n'+line;
  }
  if(cur.trim()) games.push(cur.trim());
  return games.length?games:[text.trim()];
}

function addLibraryText(text,nameIn){
  const games=splitPGNGames(text);
  const user=loadLibrary();
  let added=0; const errors=[];
  games.forEach((g,i)=>{
    try{
      const parsed=parseGame(g);
      const name=(games.length===1&&nameIn)?nameIn:(pgnDefaultName(g)+(games.length>1&&pgnDefaultName(g)==='Untitled'?' #'+(i+1):''));
      user.push({id:'u'+Date.now()+'-'+i, name, cat:libCat, plies:parsed.steps.length, pgn:g});
      added++;
    }catch(err){ errors.push('game '+(i+1)+': '+err.message); }
  });
  saveLibrary(user);
  const msg=added+' added'+(errors.length?' · '+errors.length+' failed — '+escapeHtml(errors[0]):'');
  renderLibrary(msg,!added);
}

function startSprint(item){
  let g;
  try{ g=parseGame(item.pgn); }
  catch(e){ showFeedback(false,'Cannot parse "'+escapeHtml(item.name)+'": '+escapeHtml(e.message)); renderSprintPicker(); return; }
  if(g.steps.length===0){ startPositionStudy(item,g); return; }
  const total=g.steps.length;
  const plies=item.cat==='game'?Math.min(10+2*Math.floor(score.streak/2),total):total;
  quiz={item,g,plies,pos:g.positions[plies-1],qNum:0,q:null,answered:false};
  clearBoard();
  document.getElementById('blind-cover').classList.remove('off');
  showSprintMoves(item,g,plies);
  sprintReadyUI();
}

function showSprintMoves(item,g,plies){
  const el=document.getElementById('seq-display');
  el.innerHTML=''; el.classList.add('show');
  const h=document.createElement('div'); h.className='seq-start'; h.textContent=item.name; el.appendChild(h);
  const lines=[]; let line='';
  for(let i=0;i<plies;i++){
    const s=g.steps[i];
    if(s.color==='w'){ if(line) lines.push(line); line=(Math.floor(i/2)+1)+'. '+s.san; }
    else { line+=(line?' ':'…')+s.san; lines.push(line); line=''; }
  }
  if(line) lines.push(line);
  lines.forEach(l=>{
    const d=document.createElement('div');
    d.style.cssText='color:var(--text);font-family:monospace;font-size:.86rem;padding-left:8px';
    d.textContent=l; el.appendChild(d);
  });
}

function sprintReadyUI(){
  setEx('🏃 Spatial Sprint',
    `<strong>${escapeHtml(quiz.item.name)}</strong> — play these ${quiz.plies} plies in your head.`,
    'Board covered. Press Ready when you can see the final position.');
  setAns([
    {label:'✅ Ready — quiz me',cls:'accent', cb:sprintAsk},
    {label:'▶ Watch replay',   cls:'neutral',cb:sprintReplay},
    {label:'↩ Pick another',   cls:'neutral',cb:renderSprintPicker},
  ]);
}

function sprintReplay(){
  const token=++replayToken;
  hideBlind();
  const frames=[fenToPos(quiz.g.startFen)].concat(quiz.g.positions.slice(0,quiz.plies));
  let i=0;
  renderPosition(frames[0]);
  document.getElementById('ex-hint').textContent='Replay — start position';
  setAns([{label:'■ Stop replay',cls:'neutral',cb:()=>{replayToken++;}}]);
  const iv=setInterval(()=>{
    if(mode!=='spatial-sprints'||token!==replayToken){ clearInterval(iv);
      if(mode==='spatial-sprints'){ clearBoard(); document.getElementById('blind-cover').classList.remove('off'); sprintReadyUI(); }
      return; }
    i++;
    if(i>=frames.length){
      clearInterval(iv);
      setTimeout(()=>{ if(mode==='spatial-sprints'&&token===replayToken){
        clearBoard(); document.getElementById('blind-cover').classList.remove('off'); sprintReadyUI();
      }},1200);
      return;
    }
    const step=quiz.g.steps[i-1];
    renderPosition(frames[i]);
    highlights[step.from]='sel'; highlights[step.to]='dest';
    applyHighlights();
    // re-add pieces on top (applyHighlights cleared them)
    for(const sq in frames[i].board){ const p=frames[i].board[sq]; pieces[sq]=(p.c==='w'?WSYM:BSYM)[p.t]; }
    applyHighlights();
    document.getElementById('ex-hint').textContent='Replay — '+(step.color==='w'?Math.floor((i+1)/2)+'.':'…')+step.san;
  },850);
}

function sprintAsk(){
  hideSeq(); hideTextInput();
  quiz.qNum++;
  const pos=quiz.pos;
  const entries=Object.entries(pos.board);
  const lbl=p=>`${(p.c==='w'?WSYM:BSYM)[p.t]} ${p.c==='w'?'White':'Black'} ${PIECE_NAMES[T2NAME[p.t]]}`;

  // unique pieces (exactly one of that color+type on the board)
  const counts={};
  entries.forEach(([,p])=>{ counts[p.c+p.t]=(counts[p.c+p.t]||0)+1; });
  const uniques=entries.filter(([,p])=>counts[p.c+p.t]===1);

  if(Math.random()<0.5||!uniques.length){
    // WHAT is on square X?
    const pick=entries[Math.floor(Math.random()*entries.length)];
    const correct=pick[1];
    const opts=[{c:correct.c,t:correct.t}];
    const types=Object.keys(T2NAME);
    while(opts.length<3){
      const o={c:Math.random()<0.5?'w':'b', t:types[Math.floor(Math.random()*types.length)]};
      if(!opts.some(x=>x.c===o.c&&x.t===o.t)) opts.push(o);
    }
    opts.sort(()=>Math.random()-.5);
    quiz.q={type:'what',sq:pick[0],p:correct};
    setEx('🏃 Sprint — question '+quiz.qNum+' / 3',
      `What is on <strong>${pick[0].toUpperCase()}</strong>?`,'Board stays covered');
    setAns(opts.map(o=>({label:lbl(o),cls:'neutral',cb:()=>answerSprintWhat(o)})));
  } else {
    // WHERE is unique piece Y?
    const pick=uniques[Math.floor(Math.random()*uniques.length)];
    quiz.q={type:'where',sq:pick[0],p:pick[1]};
    setEx('🏃 Sprint — question '+quiz.qNum+' / 3',
      `Where is the ${lbl(pick[1])}?`,'Type the square — board stays covered');
    showTextInput({}); focusInput(); setAns([]);
  }
}

function answerSprintWhat(o){
  if(!quiz.q||quiz.q.type!=='what') return;
  const right=o.c===quiz.q.p.c&&o.t===quiz.q.p.t;
  const lbl=`${(quiz.q.p.c==='w'?WSYM:BSYM)[quiz.q.p.t]} ${quiz.q.p.c==='w'?'White':'Black'} ${PIECE_NAMES[T2NAME[quiz.q.p.t]]}`;
  quiz.q=null;
  recordAnswer(right);
  showFeedback(right, right?'✓ correct':'✗ it was '+lbl);
  autoNext(quiz.qNum<3?sprintAsk:sprintFinish);
}

function submitSprintWhere(input){
  if(!quiz.q||quiz.q.type!=='where') return;
  const ans=normSq(input);
  if(!isValidSqName(ans)){ shakeInput(); return; }
  const right=ans===quiz.q.sq;
  const target=quiz.q.sq.toUpperCase();
  quiz.q=null;
  clearInput(); hideTextInput();
  recordAnswer(right);
  showFeedback(right, right?'✓ '+target:'✗ it was on '+target);
  autoNext(quiz.qNum<3?sprintAsk:sprintFinish);
}

function sprintFinish(){
  hideBlind();
  renderPosition(quiz.pos);
  setEx('🏃 Sprint complete',
    `<strong>${escapeHtml(quiz.item.name)}</strong> — final position revealed.`,
    'Check what you had wrong, then go again.');
  setAns([
    {label:'🔁 Same line again',cls:'accent', cb:()=>startSprint(quiz.item)},
    {label:'▶ Watch replay',    cls:'neutral',cb:sprintReplay},
    {label:'📚 Pick another',   cls:'neutral',cb:renderSprintPicker},

}

function startPositionStudy(item,g){
  // FEN-only items (endgames): study the position, then recall it
  quiz={item,g,plies:0,pos:g.finalPos,qNum:0,q:null};
  hideBlind();
  renderPosition(g.finalPos);
  let countdown=8;
  setEx('🏁 Position study',
    `<strong>${escapeHtml(item.name)}</strong> — memorize the position. Pawn structure first, then pieces.`,
    'Covering in '+countdown+'s…');
  setAns([{label:'Skip — quiz me now',cls:'accent',cb:()=>{ countdown=0; }}]);
  const tick=setInterval(()=>{
    if(mode!=='spatial-sprints'){ clearInterval(tick); return; }
    countdown--;
    if(countdown>0){ document.getElementById('ex-hint').textContent='Covering in '+countdown+'s…'; }
    else{
      clearInterval(tick);
      clearBoard();
      document.getElementById('blind-cover').classList.remove('off');
      sprintAsk();
    }
  },1000);
}

// ════════════════════════════════════════════════════
function modeKnightTour(){
  setInfo(`<strong>Knight Tour</strong><br><br>
    The protocol drill: trace a knight from A to B hop by hop, naming each landing square <em>with its color</em> — board covered the whole way.<br><br>
    Type each hop as square+color: <kbd>c3d</kbd> (dark) or <kbd>f5l</kbd> (light).<br><br>
    Any legal route counts — the minimum is shown for reference. A wrong color or an illegal hop ends the run.<br><br>
    Remember: the knight ALWAYS changes square color on every hop.`);
  nextKnightTour();
}

function nextKnightTour(){
  let sf,sr,ef,er,opt;
  if(Math.random()<0.15){ sf=0;sr=0;ef=7;er=7; }   // the classic a1 → h8
  else{
    do{
      ({f:sf,r:sr}=randSq()); ({f:ef,r:er}=randSq());
      const p=knightPath(sf,sr,ef,er);
      opt=p?p.length-1:0;
    }while(opt<3||opt>5);
  }
  opt=knightPath(sf,sr,ef,er).length-1;
  quiz={sf,sr,ef,er,opt,cur:{f:sf,r:sr},hops:0,answered:false};
  clearBoard();
  document.getElementById('blind-cover').classList.remove('off');
  highlights[sqName(sf,sr)]='sel';
  highlights[sqName(ef,er)]='dest';
  pieces[sqName(sf,sr)]='♞';
  applyHighlights();
  setEx('Knight Tour',
    `♞ <strong>${sqName(sf,sr).toUpperCase()}</strong> → reach <strong>${sqName(ef,er).toUpperCase()}</strong><br>Minimum: ${opt} hops`,
    'Type each hop WITH its color, e.g. <kbd>c3d</kbd> · knight alternates colors every hop');
  showTextInput({placeholder:'hop + color, e.g. c3d'}); focusInput();
  setAns([{label:'Give up',cls:'neutral',cb:revealKnightTour}]);
}

function submitKnightTour(input){
  if(quiz.answered) return;
  const {sq,color}=parseSquareColor(input);
  if(!isValidSqName(sq)||!color){ shakeInput(); return; }
  const legal=knightMoves(quiz.cur.f,quiz.cur.r).some(s=>sqName(s.f,s.r)===sq);
  if(!legal){
    quiz.answered=true; recordAnswer(false);
    revealKnightTour(`✗ ${sq.toUpperCase()} is not a knight hop from ${sqName(quiz.cur.f,quiz.cur.r).toUpperCase()}`);
    return;
  }
  const {f,r}=parseSq(sq);
  const realColor=sqColorName(f,r);
  if(color!==realColor){
    quiz.answered=true; recordAnswer(false);
    revealKnightTour(`✗ ${sq.toUpperCase()} is <strong>${realColor}</strong>, not ${color}`);
    return;
  }
  clearInput();
  quiz.cur={f,r}; quiz.hops++;
  if(!highlights[sq]) highlights[sq]='path';
  applyHighlights();
  if(f===quiz.ef&&r===quiz.er){
    quiz.answered=true;
    recordAnswer(true);
    hideBlind();
    showFeedback(true,`✓ Reached in ${quiz.hops} hops${quiz.hops===quiz.opt?' — optimal!':' (minimum '+quiz.opt+')'}`);
    hideTextInput();
    autoNext(nextKnightTour);
  } else {
    setEx('Knight Tour',
      `✓ ${sq.toUpperCase()} (${color}) — hop ${quiz.hops}<br>♞ now reach <strong>${sqName(quiz.ef,quiz.er).toUpperCase()}</strong>`,
      'Next hop + color, e.g. <kbd>c3d</kbd>');
    focusInput();
  }
}

function revealKnightTour(msg){
  quiz.answered=true; lastRight=false; hideBlind();
  const path=knightPath(quiz.sf,quiz.sr,quiz.ef,quiz.er);
  path.forEach((s,i)=>{
    const k=sqName(s.f,s.r);
    highlights[k]=i===0?'sel':i===path.length-1?'ok':'path';
  });
  pieces[sqName(quiz.sf,quiz.sr)]='♞';
  applyHighlights(); hideTextInput();
  const route=path.map(s=>sqName(s.f,s.r).toUpperCase()+' ('+sqColorName(s.f,s.r)[0]+')').join(' → ');
  showFeedback(false,(msg?msg+'<br>':'')+'Optimal: '+route);
  autoNext(nextKnightTour);
}

// ════════════════════════════════════════════════════
//  MODE: DIAGONAL QUIZ ⤢  (name a diagonal in order)
// ════════════════════════════════════════════════════
function modeDiagonals(){
  setInfo(`<strong>Diagonal Quiz</strong><br><br>
    A diagonal is named by its two ends. Type every square on it IN ORDER, starting after the first end.<br><br>
    Self-check: all squares on one diagonal share the same color — if your color formula disagrees mid-diagonal, you slipped.<br><br>
    Entry mode setting applies: one at a time, or the whole diagonal in one line.`);
  nextDiagonals();
}

function nextDiagonals(){
  let cells=[];
  do{
    const {f,r}=randSq();
    const dir=Math.random()<0.5?[1,1]:[1,-1];
    let cf=f,cr=r;
    while(valid(cf-dir[0],cr-dir[1])){ cf-=dir[0]; cr-=dir[1]; }
    cells=[];
    while(valid(cf,cr)){ cells.push(sqName(cf,cr)); cf+=dir[0]; cr+=dir[1]; }
  }while(cells.length<4);

  quiz={cells,idx:1,answered:false};
  clearBoard();
  document.getElementById('blind-cover').classList.remove('off');
  const batch=settings.entry==='batch';
  const a=cells[0].toUpperCase(), b=cells[cells.length-1].toUpperCase();
  setEx('Diagonal Quiz',
    `Diagonal <strong>${a}</strong> → <strong>${b}</strong> (${cells.length} squares, all ${sqColorName(...parseSqArr(cells[0]))})<br>Name them in order, starting AFTER ${a}.`,
    batch?'Type the remaining '+(cells.length-1)+' squares in one line':'Square 2 of '+cells.length);
  showTextInput(batch?{batch:true,placeholder:'in order after '+a.toLowerCase()}:{});
  focusInput();
  setAns([{label:'Give up',cls:'neutral',cb:revealDiagonals}]);
}

function submitDiagonals(input){
  if(quiz.answered) return;
  if(settings.entry==='batch'){
    const given=parseSquares(input);
    if(!given.length){ shakeInput(); return; }
    quiz.answered=true;
    const exp=quiz.cells.slice(1);
    let ok=given.length===exp.length;
    if(ok) for(let i=0;i<exp.length;i++){ if(given[i]!==exp[i]){ ok=false; break; } }
    recordAnswer(ok);
    quiz.idx=ok?quiz.cells.length:1;
    if(ok){
      hideBlind();
      quiz.cells.forEach(sq=>{ highlights[sq]='ok'; });
      applyHighlights();
      showFeedback(true,'✓ Whole diagonal correct!');
      hideTextInput();
      autoNext(nextDiagonals);
    } else {
      revealDiagonals('✗ Diagonal: '+quiz.cells.map(s=>s.toUpperCase()).join(' → '));
    }
    return;
  }
  const ans=normSq(input);
  if(!isValidSqName(ans)){ shakeInput(); return; }
  clearInput();
  const expected=quiz.cells[quiz.idx];
  if(ans!==expected){
    quiz.answered=true; recordAnswer(false);
    revealDiagonals(`✗ Expected ${expected.toUpperCase()}, got ${ans.toUpperCase()}`);
    return;
  }
  quiz.idx++;
  if(quiz.idx>=quiz.cells.length){
    quiz.answered=true; recordAnswer(true);
    hideBlind();
    quiz.cells.forEach(sq=>{ highlights[sq]='ok'; });
    applyHighlights();
    showFeedback(true,'✓ Whole diagonal correct!');
    hideTextInput();
    autoNext(nextDiagonals);
  } else {
    setEx('Diagonal Quiz',
      `✓ ${expected.toUpperCase()} — diagonal ${quiz.cells[0].toUpperCase()} → ${quiz.cells[quiz.cells.length-1].toUpperCase()}`,
      `Square ${quiz.idx+1} of ${quiz.cells.length}`);
    focusInput();
  }
}

function revealDiagonals(msg){
  quiz.answered=true; lastRight=false; hideBlind();
  quiz.cells.forEach((sq,i)=>{ highlights[sq]=i<quiz.idx?'ok':'dest'; });
  applyHighlights(); hideTextInput();
  if(msg) showFeedback(false,msg);
  autoNext(nextDiagonals);
}

// ════════════════════════════════════════════════════
//  MAIN CLICK HANDLER
// ════════════════════════════════════════════════════
function onSquareClick(f,r){
  switch(mode){
    case 'explore':       exploreSquare(f,r); break;
    case 'bishop-diag':   showBishopDiag(f,r); break;
    case 'rook-vision':   showRookVision(f,r); break;
    case 'knight-web': {
      const isKm=(quiz.km||[]).some(s=>s.f===f&&s.r===r);
      if(isKm){ quiz.chain=[...(quiz.chain||[]),{f:quiz.f,r:quiz.r}]; showKnightWeb(f,r); }
      else    { quiz.chain=[]; showKnightWeb(f,r); }
      break;
    }
    case 'coord-drill': clickCoordDrill(f,r); break;
  }
}

// ════════════════════════════════════════════════════
//  TEXT INPUT HANDLER
// ════════════════════════════════════════════════════
function onTextSubmit(){
  const val=document.getElementById('sq-input').value.trim();
  switch(mode){
    case 'square-namer':    submitSquareNamer(val);   break;
    case 'piece-tracker':   submitPieceTracker(val);  break;
    case 'destinations':    submitDestination(val);   break;
    case 'neighbor-quiz':   submitNeighborQuiz(val);  break;
    case 'knight-path':     submitKnightPath(val);    break;
    case 'shortest-path':   submitShortestPath(val);  break;
    case 'knight-tour':     submitKnightTour(val);    break;
    case 'diagonals':       submitDiagonals(val);     break;
    case 'spatial-sprints': submitSprintWhere(val);   break;
    case 'two-piece':         submitTwoPiece(val);       break;
    case 'position-flash':    submitPositionFlash(val);  break;
    case 'path-tracer':       submitPathTracer(val);     break;
    case 'blind-destinations':submitBlindDest(val);      break;
    case 'dest-colors':       submitDestColors(val);     break;
    case 'two-piece-path':    submitTwoPiecePath(val);   break;
    case 'path-colors':       submitPathColors(val);     break;
    case 'colored-dest':      submitColoredDest(val);    break;
    case 'step-tracer':       submitStepTracer(val);     break;
  }
}

document.getElementById('sq-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    e.stopPropagation();   // never let the same keystroke reach the document handler
    if(pendingNext){ continueNext(); return; }
    onTextSubmit();
  }
});
document.getElementById('submit-btn').addEventListener('click',onTextSubmit);

// ════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inp=document.getElementById('sq-input');
  if(document.activeElement===inp) return; // let input handle typing (incl. its own Enter-continue)
  if(pendingNext&&(e.key==='Enter'||e.key===' ')){ e.preventDefault(); continueNext(); return; }

  switch(e.key.toLowerCase()){
    // color quiz / knight color shortcuts
    case 'l':
      if(mode==='color-quiz')                              answerColor('light');
      if(mode==='knight-color')                            answerKnightColor('light');
      if(mode==='colored-dest'&&quiz.pendingSq) { e.preventDefault(); submitColoredDest('l'); }
      if(mode==='path-colors'&&quiz.pendingSq)  { e.preventDefault(); submitPathColors('l'); }
      break;
    case 'd':
      if(mode==='color-quiz')    answerColor('dark');
      if(mode==='knight-color')  answerKnightColor('dark');
      if(mode==='colored-dest'&&quiz.pendingSq) { e.preventDefault(); submitColoredDest('d'); }
      if(mode==='path-colors'&&quiz.pendingSq)  { e.preventDefault(); submitPathColors('d'); }
      break;
    case 'y':
      if(mode==='color-pair')    answerColorPair(true);
      if(mode==='reachability')  answerReachability(true);
      break;
    case 'n':
      if(mode==='color-pair')    answerColorPair(false);
      if(mode==='reachability')  answerReachability(false);
      if(mode==='explore'&&quiz.lastF!==undefined){
        clearBoard();
        const f=quiz.lastF,r=quiz.lastR;
        highlights[sqName(f,r)]='sel'; pieces[sqName(f,r)]='♞';
        knightMoves(f,r).forEach(s=>{highlights[sqName(s.f,s.r)]='dot';});
        applyHighlights();
      }
      break;

    // explore overlays
    case 'k':
      if(mode==='explore'&&quiz.lastF!==undefined){
        clearBoard();
        const f=quiz.lastF,r=quiz.lastR;
        highlights[sqName(f,r)]='sel'; pieces[sqName(f,r)]='♞';
        knightMoves(f,r).forEach(s=>{highlights[sqName(s.f,s.r)]='dot';});
        applyHighlights();
      }
      break;
    case 'b': if(mode==='explore'&&quiz.lastF!==undefined) showBishopDiag(quiz.lastF,quiz.lastR); break;
    case 'r': if(mode==='explore'&&quiz.lastF!==undefined) showRookVision(quiz.lastF,quiz.lastR); break;
    case 's':
      if(mode==='explore'&&quiz.lastF!==undefined){
        clearBoard();
        const f=quiz.lastF,r=quiz.lastR,col=sqColor(f,r);
        highlights[sqName(f,r)]='sel';
        sameColorNeighbors(f,r).forEach(s=>{highlights[sqName(s.f,s.r)]='same-color';});
        applyHighlights();
        setEx(sqName(f,r).toUpperCase()+' same-color',`Same-color (${col}) neighbors: <strong>${sameColorNeighbors(f,r).length}</strong>`,'');
      }
      break;

    case 'escape': clearBoard(); break;

    // mode shortcuts
    case '1': setMode('explore');       break;
    case '2': setMode('square-namer');  break;
    case '3': setMode('color-quiz');    break;
    case '4': setMode('color-pair');    break;
    case '5': setMode('neighbor-quiz'); break;
    case '6': setMode('knight-color');  break;
    case '7': setMode('piece-tracker'); break;
    case '8': setMode('destinations');  break;
    case '9': setMode('knight-path');   break;
  }
});

// Peek button
document.getElementById('peek-btn').addEventListener('click',()=>{
  quiz.peeked=true;
  score.hints++;
  updateScoreDisplay();
  // Temporarily hide the cover for 2s
  document.getElementById('blind-cover').classList.add('off');
  setTimeout(()=>{
    if(blindMode&&!quiz.answered) document.getElementById('blind-cover').classList.remove('off');
  },2000);
});

// Blind toggle
document.getElementById('blind-toggle').addEventListener('click',()=>{
  blindMode=!blindMode;
  const btn=document.getElementById('blind-toggle');
  btn.textContent=blindMode?'🙈 Blind ON':'🙈 Blind OFF';
  btn.classList.toggle('on',blindMode);
  if(blindMode) document.getElementById('blind-cover').classList.remove('off');
  else hideBlind();
});

// Flip
document.getElementById('flip-btn').addEventListener('click',()=>{ flipped=!flipped; buildBoard(); });

// ════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════
function setEx(title,prompt,hint=''){
  document.getElementById('ex-title').textContent=title;
  document.getElementById('ex-prompt').innerHTML=prompt;
  document.getElementById('ex-hint').innerHTML=hint;
}
function setInfo(html){ document.getElementById('info-box').innerHTML=html; }
function setAns(btns){
  const c=document.getElementById('ans-area'); c.innerHTML='';
  btns.forEach(({label,cls,cb})=>{
    const b=document.createElement('button');
    b.className='abtn '+cls; b.innerHTML=label;
    b.addEventListener('click',cb); c.appendChild(b);
  });
}
function showFeedback(ok,msg){
  const el=document.getElementById('feedback');
  el.innerHTML=msg; el.className=ok?'ok':'err';
}
function hideFeedback(){
  const el=document.getElementById('feedback');
  el.className=''; el.textContent='';
}
function recordAnswer(right){
  score.total++;
  lastRight=right;
  if(right){score.correct++;score.streak++;if(score.streak>score.best)score.best=score.streak;}
  else{score.streak=0;}
  updateScoreDisplay();
}
function continueNext(){
  if(!pendingNext) return;
  const fn=pendingNext; pendingNext=null;
  hideFeedback(); fn();
}
function autoNext(fn, delay=1500){
  setAns([]);
  if(settings.pace==='instant'){
    if(lastRight){
      // correct → straight to the next question, zero wait
      hideFeedback(); fn();
    } else {
      // wrong → keep the reveal on screen; continue when the user is ready
      pendingNext=fn;
      setAns([{label:'Continue ↵',cls:'accent',cb:continueNext}]);
    }
  } else {
    setTimeout(()=>{ hideFeedback(); fn(); }, delay);
  }
}
function updateScoreDisplay(){
  document.getElementById('s-streak').textContent=score.streak;
  document.getElementById('s-correct').textContent=score.correct;
  document.getElementById('s-total').textContent=score.total;
  document.getElementById('s-hints').textContent=score.hints;
}
function showTextInput(opts={}){
  document.getElementById('text-row').classList.remove('hidden');
  const inp=document.getElementById('sq-input');
  if(opts.batch){
    inp.removeAttribute('maxlength');
    inp.placeholder=opts.placeholder||'all squares: c3 e3 d2 …';
  } else {
    inp.setAttribute('maxlength', opts.maxlength||3);
    inp.placeholder=opts.placeholder||'type square (e.g. e4)';
  }
}
function hideTextInput(){
  document.getElementById('text-row').classList.add('hidden');
  document.getElementById('sq-input').value='';
}
function clearInput(){ document.getElementById('sq-input').value=''; }
function focusInput(){ setTimeout(()=>document.getElementById('sq-input').focus(),50); }
function shakeInput(){
  const el=document.getElementById('sq-input');
  el.style.borderColor='var(--red)';
  setTimeout(()=>{el.style.borderColor='';},600);
}
function showSeq(piece,path){
  const el=document.getElementById('seq-display');
  el.innerHTML=''; el.classList.add('show');
  const s=document.createElement('div'); s.className='seq-start';
  s.textContent=`${PIECE_NAMES[piece]} on ${sqName(path[0].f,path[0].r).toUpperCase()}`;
  el.appendChild(s);
  for(let i=1;i<path.length;i++){
    const d=document.createElement('div'); d.className='seq-move';
    d.textContent=i<path.length-1?sqName(path[i].f,path[i].r).toUpperCase():'?';
    el.appendChild(d);
  }
}
function hideSeq(){ document.getElementById('seq-display').classList.remove('show'); }
function showProg(found,total){
  const row=document.getElementById('prog-row');
  row.classList.add('show');
  document.getElementById('prog-label').textContent=`${found}/${total}`;
  document.getElementById('prog-fill').style.width=`${total?found/total*100:0}%`;
}
function hideProg(){ document.getElementById('prog-row').classList.remove('show'); }

// ════════════════════════════════════════════════════
//  SETTINGS PANEL
// ════════════════════════════════════════════════════
function renderSettingsPanel(){
  const p=document.getElementById('settings-panel');
  const b=(on,attr,label)=>`<button class="sbtn${on?' on':''}" ${attr}>${label}</button>`;
  p.innerHTML=`
    <div class="card-label">⚙ Settings</div>
    <div class="set-row"><span class="set-lbl">Pace — after an answer</span>
      ${b(settings.pace==='instant','data-pace="instant"','⚡ Instant')}
      ${b(settings.pace==='auto','data-pace="auto"','🐢 Auto-advance 1.5s')}
    </div>
    <div class="set-row"><span class="set-lbl">Multi-square answers</span>
      ${b(settings.entry==='single','data-entry="single"','One at a time')}
      ${b(settings.entry==='batch','data-entry="batch"','All at once')}
    </div>
    <div class="set-row"><span class="set-lbl">Session timer</span>
      ${b(settings.timerMin===0,'data-timer="0"','Off')}
      ${b(settings.timerMin===1,'data-timer="1"','1 min')}
      ${b(settings.timerMin===3,'data-timer="3"','3 min')}
      ${b(settings.timerMin===5,'data-timer="5"','5 min')}
      ${b(settings.timerMin===10,'data-timer="10"','10 min')}
      ${settings.timerMin>0?`<button class="sbtn" id="session-start" style="border-color:var(--green);color:var(--green)">▶ Start ${settings.timerMin} min</button>`:''}
    </div>
    <div style="font-size:.68rem;color:var(--muted);margin-top:10px;line-height:1.55">
      <strong>⚡ Instant:</strong> correct → next question immediately · wrong → the reveal stays until you press <kbd>Enter</kbd>.<br>
      <strong>All at once:</strong> type every square in one line, space-separated — <kbd>c3 e3 d2</kbd>, with colors <kbd>e4d f5l</kbd>. Applies from the next question.
    </div>`;
  p.querySelectorAll('[data-pace]').forEach(x=>x.addEventListener('click',()=>{
    settings.pace=x.dataset.pace; saveSettings(); renderSettingsPanel();
  }));
  p.querySelectorAll('[data-entry]').forEach(x=>x.addEventListener('click',()=>{
    settings.entry=x.dataset.entry; saveSettings(); renderSettingsPanel();
    if(['destinations','blind-destinations','colored-dest','path-tracer','path-colors','shortest-path','diagonals'].includes(mode)) setMode(mode);
  }));
  p.querySelectorAll('[data-timer]').forEach(x=>x.addEventListener('click',()=>{
    settings.timerMin=+x.dataset.timer; saveSettings(); renderSettingsPanel();
  }));
  const ss=p.querySelector('#session-start');
  if(ss) ss.addEventListener('click',startSession);
}

document.getElementById('settings-btn').addEventListener('click',()=>{
  const p=document.getElementById('settings-panel');
  p.classList.toggle('hidden');
  if(!p.classList.contains('hidden')) renderSettingsPanel();
});

// ════════════════════════════════════════════════════
//  SESSION TIMER
// ════════════════════════════════════════════════════
function fmtClock(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function startSession(){
  if(sessionTimer){ clearInterval(sessionTimer); }
  score={correct:0,total:0,streak:0,hints:0,best:0};
  updateScoreDisplay();
  sessionLeft=settings.timerMin*60;
  const chip=document.getElementById('session-chip');
  chip.classList.remove('hidden');
  chip.textContent='⏱ '+fmtClock(sessionLeft);
  chip.style.borderColor='var(--accent)'; chip.style.color='var(--accent)';
  document.getElementById('settings-panel').classList.add('hidden');
  sessionTimer=setInterval(()=>{
    sessionLeft--;
    chip.textContent='⏱ '+fmtClock(Math.max(sessionLeft,0));
    if(sessionLeft<=10){ chip.style.borderColor='var(--red)'; chip.style.color='var(--red)'; }
    if(sessionLeft<=0) endSession();
  },1000);
}

function endSession(){
  if(sessionTimer){ clearInterval(sessionTimer); sessionTimer=null; }
  document.getElementById('session-chip').classList.add('hidden');
  const acc=score.total?Math.round(score.correct/score.total*100):0;
  document.getElementById('sum-score').textContent=`${score.correct} / ${score.total}`;
  document.getElementById('sum-detail').innerHTML=
    `${acc}% accuracy · best streak <strong style="color:var(--accent)">${score.best}</strong> · ${score.hints} hint${score.hints!==1?'s':''}`;
  document.getElementById('session-overlay').classList.remove('hidden');
}

document.getElementById('session-chip').addEventListener('click',endSession);
document.getElementById('sum-again').addEventListener('click',()=>{
  document.getElementById('session-overlay').classList.add('hidden');
  startSession();
});
document.getElementById('sum-close').addEventListener('click',()=>{
  document.getElementById('session-overlay').classList.add('hidden');
});
